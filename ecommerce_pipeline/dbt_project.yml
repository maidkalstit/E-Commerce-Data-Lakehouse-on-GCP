# Name your project! 
name: 'ecommerce_pipeline'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'ecommerce_pipeline'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# ==============================================================================
# MODELS CONFIGURATION (Medallion Architecture)
# ==============================================================================
models:
  ecommerce_pipeline:
    # Staging Layer (Silver - Read directly from GCS Parquet via Zero-ETL)
    staging:
      +materialized: view
      
    # Marts Layer (Gold - Store report results in BigQuery to accelerate BI)
    marts:
      +materialized: table